name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Self-test
        # xcrun may emit a harmless "PlatformPath" warning to stderr; exit code is authoritative.
        run: swift run seemd-selftest

      - name: Bundle app
        run: ./scripts/bundle.sh release

      - name: Create DMG
        run: ./scripts/make-dmg.sh

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/seemd.dmg
          fail_on_unmatched_files: true
